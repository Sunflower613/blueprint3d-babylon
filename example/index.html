<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>blueprint3d-babylon 测试地图</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="workspace">
        <aside class="panel left-panel">
          <button id="btn-toggle-left" class="toggle-side-btn" type="button" aria-label="收起面板">‹</button>
          <div class="left-panel-content">
            <nav class="tabs" aria-label="编辑模式">
            <div class="tabs-slider"></div>
            <button class="tab active" type="button" data-tab="floorplan">
              <svg class="tab-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M21 12H3"/><path d="M12 3v18"/></svg>
              <span class="tab-text">户型</span>
            </button>
            <button class="tab" type="button" data-tab="design">
              <svg class="tab-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><g transform="translate(1.2, 1.2) scale(0.9)"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.63-.77 1.63-1.7 0-.43-.16-.83-.41-1.16a.81.81 0 0 1-.22-.56c0-.44.33-.8 1.72-.8 5.48 0 9.28-4.5 9.28-10C24 6.5 18.62 2 12 2z"/></g></svg>
              <span class="tab-text">设计</span>
            </button>
            <button class="tab" type="button" data-tab="items">
              <svg class="tab-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 9V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v3"/><path d="M2 11v5a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5"/><path d="M2 9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4H2Z"/><path d="M6 18v2"/><path d="M18 18v2"/></svg>
              <span class="tab-text">家具</span>
            </button>
          </nav>

          <section class="tool-section" data-panel="floorplan">
            <h2>建筑工具</h2>
            <div class="segmented floor-tools">
              <button class="mode active" type="button" data-mode="select">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m4 4 7.07 17 2.51-7.39L21 11.1z"/></svg>
                <span class="mode-text">选择</span>
                <span class="mode-shortcut">Space</span>
              </button>
              <button class="mode" type="button" data-mode="view">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                <span class="mode-text">查看</span>
                <span class="mode-shortcut">V</span>
              </button>
              <button class="mode" type="button" data-mode="draw-wall">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                <span class="mode-text">画墙</span>
                <span class="mode-shortcut">L</span>
              </button>
              <button class="mode" type="button" data-mode="delete-wall">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21Z"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
                <span class="mode-text">删墙</span>
                <span class="mode-shortcut">E</span>
              </button>
              <button class="mode hidden" type="button" data-mode="add-room">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
                <span class="mode-text">房间</span>
                <span class="mode-shortcut">R</span>
              </button>
              <button class="mode hidden" type="button" data-mode="add-door">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V6a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v14"/><path d="M2 20h20"/><path d="M14 12v.01"/></svg>
                <span class="mode-text">加门</span>
                <span class="mode-shortcut">D</span>
              </button>
              <button class="mode hidden" type="button" data-mode="add-window">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 12h18"/><path d="M12 3v18"/></svg>
                <span class="mode-text">加窗</span>
                <span class="mode-shortcut">W</span>
              </button>
            </div>

            <div class="building-tool-group" data-tool-group="room">
              <button class="tool-group-toggle" type="button" aria-expanded="false" aria-controls="room-tools">
                <span>房间</span>
                <svg class="tool-group-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </button>
              <div id="room-tools" class="segmented room-tools hidden">
                <button class="mode" type="button" data-mode="add-room-square"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16"/></svg><span class="mode-text">方形</span><span class="mode-shortcut">R</span></button>
                <button class="mode" type="button" data-mode="add-room-l-shape"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h9v7h7v9H4z"/></svg><span class="mode-text">L形</span></button>
                <button class="mode" type="button" data-mode="add-room-circle"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg><span class="mode-text">圆形</span></button>
                <button class="mode" type="button" data-mode="add-room-octagon"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m8 3 8 0 5 5 0 8-5 5H8l-5-5V8z"/></svg><span class="mode-text">八角</span></button>
                <button class="mode" type="button" data-mode="add-room-diamond"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3 9 9-9 9-9-9z"/></svg><span class="mode-text">四角</span></button>
                <button class="mode" type="button" data-mode="add-room-sector"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4a16 16 0 0 1 16 16H4z"/></svg><span class="mode-text">扇形</span></button>
                <button class="mode" type="button" data-mode="add-room-semicircle"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 18a8 8 0 0 1 16 0z"/></svg><span class="mode-text">半圆</span></button>
                <button class="mode" type="button" data-mode="add-room-right-triangle"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16h16z"/></svg><span class="mode-text">直角三角形</span></button>
              </div>
            </div>

            <div class="building-tool-group" data-tool-group="door">
              <button class="tool-group-toggle" type="button" aria-expanded="false" aria-controls="door-tools"><span>门</span><svg class="tool-group-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
              <div id="door-tools" class="segmented opening-tools hidden">
                <button class="mode" type="button" data-mode="add-door-square"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18"/></svg><span class="mode-text">方形</span><span class="mode-shortcut">D</span></button>
                <button class="mode" type="button" data-mode="add-door-diamond"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3 8 9-8 9-8-9z"/></svg><span class="mode-text">四角</span></button>
                <button class="mode" type="button" data-mode="add-door-circle"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg><span class="mode-text">圆形</span></button>
                <button class="mode" type="button" data-mode="add-door-semicircle"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 18a8 8 0 0 1 16 0z"/></svg><span class="mode-text">半圆形</span></button>
                <button class="mode" type="button" data-mode="add-door-round-arch"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 21V10a7 7 0 0 1 14 0v11z"/></svg><span class="mode-text">半圆顶方形</span></button>
                <button class="mode" type="button" data-mode="add-door-pointed-arch"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 21V10l7-7 7 7v11z"/></svg><span class="mode-text">尖顶方形</span></button>
                <button class="mode" type="button" data-mode="add-door-quarter-sector"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4a16 16 0 0 1 16 16H4z"/></svg><span class="mode-text">1/4扇形</span></button>
                <button class="mode" type="button" data-mode="add-door-right-triangle"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16h16z"/></svg><span class="mode-text">直角三角形</span></button>
              </div>
            </div>

            <div class="building-tool-group" data-tool-group="window">
              <button class="tool-group-toggle" type="button" aria-expanded="false" aria-controls="window-tools"><span>窗</span><svg class="tool-group-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
              <div id="window-tools" class="segmented opening-tools hidden">
                <button class="mode" type="button" data-mode="add-window-square"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16"/></svg><span class="mode-text">方形</span><span class="mode-shortcut">W</span></button>
                <button class="mode" type="button" data-mode="add-window-diamond"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3 9 9-9 9-9-9z"/></svg><span class="mode-text">四角</span></button>
                <button class="mode" type="button" data-mode="add-window-circle"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg><span class="mode-text">圆形</span></button>
                <button class="mode" type="button" data-mode="add-window-semicircle"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 18a8 8 0 0 1 16 0z"/></svg><span class="mode-text">半圆形</span></button>
                <button class="mode" type="button" data-mode="add-window-round-arch"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 21V10a7 7 0 0 1 14 0v11z"/></svg><span class="mode-text">半圆顶方形</span></button>
                <button class="mode" type="button" data-mode="add-window-pointed-arch"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 21V10l7-7 7 7v11z"/></svg><span class="mode-text">尖顶方形</span></button>
                <button class="mode" type="button" data-mode="add-window-quarter-sector"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4a16 16 0 0 1 16 16H4z"/></svg><span class="mode-text">1/4扇形</span></button>
                <button class="mode" type="button" data-mode="add-window-right-triangle"><svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16h16z"/></svg><span class="mode-text">直角三角形</span></button>
              </div>
            </div>

            <div class="building-tool-group" data-tool-group="roof">
              <button class="tool-group-toggle" type="button" aria-expanded="false" aria-controls="roof-tools">
                <span>屋顶</span>
                <svg class="tool-group-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </button>
              <div id="roof-tools" class="segmented roof-tools">
              <button class="mode" type="button" data-mode="add-roof-gable">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12L2 20h20Z"/></svg>
                <span class="mode-text">双斜坡</span>
              </button>
              <button class="mode" type="button" data-mode="add-roof-shed">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20"/><path d="M2 20 L22 10 L22 20 Z"/></svg>
                <span class="mode-text">单斜坡</span>
              </button>
              <button class="mode" type="button" data-mode="add-roof-arch">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20"/><path d="M2 20 C2 8 22 8 22 20 Z"/></svg>
                <span class="mode-text">拱形顶</span>
              </button>
              <button class="mode" type="button" data-mode="add-roof-dome">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20"/><path d="M5 20 A7 7 0 0 1 19 20 Z"/></svg>
                <span class="mode-text">穹型顶</span>
              </button>
              <button class="mode" type="button" data-mode="add-roof-trapezoid">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20"/><path d="M4 20 L8 10 L16 10 L20 20 Z"/></svg>
                <span class="mode-text">梯形顶</span>
              </button>
              <button class="mode" type="button" data-mode="add-roof-hip">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20"/><path d="M2 20 L7 12 L17 12 L22 20 Z M7 12 L12 6 L17 12"/></svg>
                <span class="mode-text">四角顶</span>
              </button>
              <button class="mode" type="button" data-mode="add-roof-flat">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20"/><rect x="4" y="14" width="16" height="4" rx="1"/></svg>
                <span class="mode-text">平屋顶</span>
              </button>
              </div>
            </div>

            <div class="building-tool-group" data-tool-group="stairs">
              <button class="tool-group-toggle" type="button" aria-expanded="true" aria-controls="stairs-tools">
                <span>楼梯</span>
                <svg class="tool-group-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </button>
              <div id="stairs-tools" class="segmented stairs-tools">
              <button class="mode" type="button" data-mode="add-stairs-straight">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 20h14"/><path d="M10 16h10"/><path d="M14 12h6"/><path d="M18 8h2"/><path d="M2 20h4v-4h4v-4h4V8h4V4h4"/></svg>
                <span class="mode-text">直跑楼梯</span>
              </button>
              <button class="mode" type="button" data-mode="add-stairs-lshape">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h6v-6h6v-6h6V4"/><path d="M2 20v-4h4v-4h4v-4h4V4h6"/></svg>
                <span class="mode-text">L形折返</span>
              </button>
              <button class="mode" type="button" data-mode="add-stairs-ushape">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20v-8h6v8"/><path d="M15 20v-8h6v8"/><path d="M9 12h6"/></svg>
                <span class="mode-text">U形折返</span>
              </button>
              <button class="mode" type="button" data-mode="add-stairs-spiral">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M12 6c4 0 4 4 0 4s-4 4 0 4 4 4 0 4"/></svg>
                <span class="mode-text">旋转楼梯</span>
              </button>
              <button class="mode" type="button" data-mode="add-stairs-curved">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20 A16 16 0 0 1 20 4"/><path d="M8 20 A12 12 0 0 1 20 8"/></svg>
                <span class="mode-text">弧形楼梯</span>
              </button>
              <button class="mode" type="button" data-mode="add-stairs-floating">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h6 M8 14h6 M14 10h6"/><path d="M2 20 L22 8" stroke-dasharray="2,2"/></svg>
                <span class="mode-text">悬浮楼梯</span>
              </button>
              </div>
            </div>

            <div class="building-tool-group" data-tool-group="fence">
              <button class="tool-group-toggle" type="button" aria-expanded="true" aria-controls="fence-tools">
                <span>栅栏</span>
                <svg class="tool-group-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </button>
              <div id="fence-tools" class="segmented fence-tools">
              <button class="mode" type="button" data-mode="draw-fence-picket_wood">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22V4M20 22V4M4 8h16M4 16h16"/></svg>
                <span class="mode-text">木栅栏</span>
              </button>
              <button class="mode" type="button" data-mode="draw-fence-iron_ornamental">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V2M18 22V2M2 6h20M2 18h20M12 22V2"/></svg>
                <span class="mode-text">铁艺栏</span>
              </button>
              <button class="mode" type="button" data-mode="draw-fence-wire_mesh">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22V2M20 22V2M4 6l16 4M4 12l16 4M4 18l16-4"/></svg>
                <span class="mode-text">铁丝网</span>
              </button>
              <button class="mode" type="button" data-mode="draw-fence-stone_masonry">
                <svg class="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22V10h18v12M3 14h18M3 18h18M9 10v12M15 10v12"/></svg>
                <span class="mode-text">石砌矮墙</span>
              </button>
              <button class="mode" type="button" data-mode="draw-fence-bamboo">

                <input id="item-light-on" type="checkbox" />
                <span>开启灯光</span>
              </label>
              <button id="btn-delete-item" type="button" class="danger">删除家具</button>
            </div>

            <div id="opening-editor" class="editor hidden">
              <div class="editor-header">
                <strong id="selected-opening-name">门窗</strong>
                <label class="switch">
                  <input id="opening-locked" type="checkbox" />
                  <span class="slider">
                    <span class="slider-button">
                      <svg class="slider-icon unlock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                      </svg>
                      <svg class="slider-icon lock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                      </svg>
                    </span>
                  </span>
                </label>
              </div>
              <label class="field">
                <span>沿墙位置</span>
                <input id="opening-position" type="range" min="8" max="92" step="1" />
              </label>
              <div class="field">
                <span>轮廓</span>
                <select id="opening-shape">
                  <option value="square" data-icon='<rect x="5" y="3" width="14" height="18"/>'>方形</option>
                  <option value="diamond" data-icon='<path d="m12 3 8 9-8 9-8-9z"/>'>四角</option>
                  <option value="circle" data-icon='<circle cx="12" cy="12" r="8"/>'>圆形</option>
                  <option value="semicircle" data-icon='<path d="M4 18a8 8 0 0 1 16 0z"/>'>半圆形</option>
                  <option value="round-arch" data-icon='<path d="M5 21V10a7 7 0 0 1 14 0v11z"/>'>半圆顶方形</option>
                  <option value="pointed-arch" data-icon='<path d="M5 21V10l7-7 7 7v11z"/>'>尖顶方形</option>
                  <option value="quarter-sector" data-icon='<path d="M4 4a16 16 0 0 1 16 16H4z"/>'>1/4扇形</option>
                  <option value="right-triangle" data-icon='<path d="M4 4v16h16z"/>'>直角三角形</option>
                </select>
              </div>
              <div class="fields-row">
                <label class="field">
                  <span>宽度 (m)</span>
                  <input id="opening-width" type="number" min="0.25" max="3.6" step="0.05" />
                </label>
                <label id="opening-height-field" class="field hidden">
                  <span>高度 (m)</span>
                  <input id="opening-height" type="number" min="0.3" max="2.2" step="0.05" />
                </label>
              </div>
              <label id="opening-sill-field" class="field hidden">
                <span>离地高度 (m)</span>
                <input id="opening-sill-height" type="number" min="0" max="2.4" step="0.05" />
              </label>
              <label id="opening-open-field" class="check-field hidden">
                <input id="opening-open" type="checkbox" />
                <span>开启状态</span>
              </label>
              <label id="opening-double-door-field" class="check-field hidden">
                <input id="opening-double-door" type="checkbox" />
                <span>双开门</span>
              </label>
              <label id="opening-flip-lr-field" class="check-field hidden">
                <input id="opening-flip-lr" type="checkbox" />
                <span>左右翻转</span>
              </label>
              <label id="opening-flip-io-field" class="check-field hidden">
                <input id="opening-flip-io" type="checkbox" />
                <span>内外翻转</span>
              </label>
              <label class="check-field">
                <input id="opening-content-hidden" type="checkbox" />
                <span id="opening-content-hidden-label">隐藏门板</span>
              </label>
              <button id="btn-delete-opening" type="button" class="danger">删除门窗</button>
            </div>

            <div id="fence-gate-editor" class="editor hidden">
              <div class="editor-header">
                <strong>栅栏门属性</strong>
                <label class="switch">
                  <input id="fence-gate-locked" type="checkbox" />
                  <span class="slider">
                    <span class="slider-button">
                      <svg class="slider-icon unlock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                      </svg>
                      <svg class="slider-icon lock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                      </svg>
                    </span>
                  </span>
                </label>
              </div>
              <div class="field">
                <span>样式</span>
                <select id="fence-gate-subtype">
                  <option value="picket_wood" data-icon='<path d="M3 22V4h3v18M18 22V4h3v18M6 8h12M6 16h12M9 8v8M15 8v8"/>'>木栅栏门</option>
                  <option value="iron_ornamental" data-icon='<path d="M3 22V4M21 22V4M6 6h12M6 18h12M12 22V4M9 10a3 3 0 0 1 6 0"/>'>铁艺栏杆门</option>
                  <option value="wire_mesh" data-icon='<path d="M3 22V4M21 22V4M3 8l18 4M3 14l18-4M3 18l18 2"/>'>铁丝网门</option>
                  <option value="stone_masonry" data-icon='<path d="M3 22V6h4v16M17 22V6h4v16M7 10h10M7 16h10M12 22V10"/>'>石砌矮墙门</option>
                  <option value="bamboo" data-icon='<path d="M4 22V4M20 22V4M9 22V4M15 22V4M4 8h16M4 16h16"/>'>竹大门</option>
                  <option value="glass_rail" data-icon='<path d="M4 22V4M20 22V4M4 6h16M4 18h16"/>'>玻璃门</option>
                  <option value="concrete" data-icon='<rect x="3" y="3" width="18" height="18" rx="1"/><path d="M12 3v18"/>'>混凝土门</option>
                  <option value="rope" data-icon='<rect x="3" y="3" width="18" height="18" rx="1"/><path d="M3 10c3 2 6 2 9 0M12 10c3 2 6 2 9 0M3 15c3 2 6 2 9 0M12 15c3 2 6 2 9 0"/>'>绳索栅栏门</option>
                </select>
              </div>
              <label id="fence-gate-position-field" class="field hidden">
                <span>沿栏位置</span>
                <input id="fence-gate-position" type="range" min="2" max="98" step="1" />
              </label>
              <div class="fields-row">
                <label class="field">
                  <span>宽度 (m)</span>
                  <input id="fence-gate-width" type="number" min="0.4" max="3.0" step="0.05" />
                </label>
                <label class="field">
                  <span>高度 (m)</span>
                  <input id="fence-gate-height" type="number" min="0.2" max="2.5" step="0.05" />
                </label>
              </div>
              <div class="fields-row">
                <label class="field">
                  <span>厚度 (m)</span>
                  <input id="fence-gate-thickness" type="number" min="0.04" max="0.5" step="0.01" />
                </label>
                <label class="field">
                  <span>离地高度 (m)</span>
                  <input id="fence-gate-yoffset" type="number" min="-1" max="2" step="0.05" />
                </label>
              </div>
              <div class="fields-row">
                <label class="check-field">
                  <input id="fence-gate-open" type="checkbox" />
                  <span>开启状态</span>
                </label>
                <label class="check-field">
                  <input id="fence-gate-double-door" type="checkbox" />
                  <span>双开门</span>
                </label>
              </div>
              <div class="fields-row">
                <label class="check-field">
                  <input id="fence-gate-flip-lr" type="checkbox" />
                  <span>左右翻转</span>
                </label>
                <label class="check-field">
                  <input id="fence-gate-flip-io" type="checkbox" />
                  <span>内外翻转</span>
                </label>
              </div>
              <label class="check-field">
                <input id="fence-gate-content-hidden" type="checkbox" />
                <span>隐藏门板</span>
              </label>
              <button id="btn-delete-fence-gate" type="button" class="danger">删除栅栏门</button>
            </div>
          </div>
        </aside>
      </main>
    </div>
    <!-- Keep main.js as the entry: loading app.js directly duplicates it through EditorUi's circular import under Vite HMR. -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
